name: Adhi Job Bot

on:
  schedule:
    # Runs every 3 days at 3:00 AM UTC (8:30 AM IST)
    - cron: '0 3 */3 * *'
  workflow_dispatch:  # manual trigger

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 150  # Safely covers the 2-hour (120 minutes) delay reminder

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore seen jobs cache
        id: restore-cache
        uses: actions/cache/restore@v4
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: |
            seen-jobs-

      - name: Initialize seen_jobs.json if not present
        run: |
          if [ ! -f seen_jobs.json ]; then
            echo "[]" > seen_jobs.json
          fi

      - name: Run job bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Save seen jobs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
